  <section class="box">
    <h1>Canais de Atendimento</h1>
    <p class="subtitulo">Como você prefere falar com a gente?</p>

    <div class="cards">
      <div class="card">
        <div class="icone whatsapp">☎</div>
        <h2>WhatsApp</h2>
        <p class="contato">(11) 99999-9999</p>
        <a href="https://wa.me/5511999999999" target="_blank">Chamar</a>
      </div>

      <div class="card">
        <div class="icone telefone">📞</div>
        <h2>Central 24h</h2>
        <p class="contato">0800 777 0000</p>
        <span>Ligação gratuita</span>
      </div>

      <div class="card">
        <div class="icone email">✉</div>
        <h2>E-mail</h2>
        <p class="contato">contato@maismed.com</p>
        <a href="mailto:contato@maismed.com">Escrever</a>
      </div>
    </div>
  </section>
