<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificar Funcionário</title>
  <link rel="stylesheet" href="../css/funcionario.css">
</head>
<body>

<header>
  <div class="logo">+Med</div>

  <nav>
    <a href="index.html">Início</a>
    <a href="agendar.html">Agendar consulta</a>
    <a href="funcionario.html">Verificar funcionário</a>
    <a href="atendimento.html">Canais de Atendimento</a>
  </nav>

  <a href="login.html" class="btn-login">Login / Cadastro</a>
</header>

<main>
  <section class="box">
    <h1>Gerenciamento de Funcionários</h1>

    <div class="abas">
      <button class="aba ativa" onclick="mostrarCadastro()">Cadastro</button>
      <button class="aba" onclick="mostrarConsulta()">Consulta</button>
    </div>

    <form id="formCadastro" class="formulario">
      <input type="text" id="nome" placeholder="Nome completo">
      <input type="text" id="idFuncionario" placeholder="ID do funcionário">

      <input type="email" id="email" placeholder="E-mail">
      <input type="tel" id="telefone" placeholder="Telefone">

      <input type="text" id="cpf" placeholder="CPF">

      <select id="funcao">
        <option value="">Selecione a função</option>
        <option value="Médico">Médico</option>
        <option value="Enfermeiro">Enfermeiro</option>
        <option value="Recepcionista">Recepcionista</option>
        <option value="Administrador">Administrador</option>
      </select>

      <input type="text" id="crm" placeholder="CRM">
      <input type="text" id="especialidade" placeholder="Especialidade">

      <button type="button" class="btn-principal" onclick="cadastrarFuncionario()">Cadastrar</button>
    </form>

    <div id="areaConsulta" class="consulta escondido">
      <input type="text" id="buscarFuncionario" placeholder="Digite o ID, CPF ou nome do funcionário">
      <button class="btn-principal" onclick="consultarFuncionario()">Consultar</button>
      <div id="resultado"></div>
    </div>
  </section>
</main>

<script>
  let funcionarios = JSON.parse(localStorage.getItem("funcionarios")) || [];

  function mostrarCadastro() {
    document.getElementById("formCadastro").classList.remove("escondido");
    document.getElementById("areaConsulta").classList.add("escondido");

    document.querySelectorAll(".aba")[0].classList.add("ativa");
    document.querySelectorAll(".aba")[1].classList.remove("ativa");
  }

  function mostrarConsulta() {
    document.getElementById("formCadastro").classList.add("escondido");
    document.getElementById("areaConsulta").classList.remove("escondido");

    document.querySelectorAll(".aba")[0].classList.remove("ativa");
    document.querySelectorAll(".aba")[1].classList.add("ativa");
  }

  function cadastrarFuncionario() {
    const funcionario = {
      nome: document.getElementById("nome").value.trim(),
      id: document.getElementById("idFuncionario").value.trim(),
      email: document.getElementById("email").value.trim(),
      telefone: document.getElementById("telefone").value.trim(),
      cpf: document.getElementById("cpf").value.trim(),
      funcao: document.getElementById("funcao").value,
      crm: document.getElementById("crm").value.trim(),
      especialidade: document.getElementById("especialidade").value.trim()
    };

    if (!funcionario.nome || !funcionario.id || !funcionario.email || !funcionario.telefone || !funcionario.cpf || !funcionario.funcao) {
      alert("Preencha todos os campos obrigatórios.");
      return;
    }

    const existe = funcionarios.some(item => item.id === funcionario.id || item.cpf === funcionario.cpf);

    if (existe) {
      alert("Funcionário já cadastrado com esse ID ou CPF.");
      return;
    }

    funcionarios.push(funcionario);
    localStorage.setItem("funcionarios", JSON.stringify(funcionarios));

    alert("Funcionário cadastrado com sucesso!");
    document.getElementById("formCadastro").reset();
  }

  function consultarFuncionario() {
    const busca = document.getElementById("buscarFuncionario").value.trim().toLowerCase();
    const resultado = document.getElementById("resultado");

    if (!busca) {
      resultado.innerHTML = "<p class='erro'>Digite um ID, CPF ou nome para consultar.</p>";
      return;
    }

    const funcionario = funcionarios.find(item =>
      item.id.toLowerCase() === busca ||
      item.cpf.toLowerCase() === busca ||
      item.nome.toLowerCase().includes(busca)
    );

    if (!funcionario) {
      resultado.innerHTML = "<p class='erro'>Funcionário não encontrado.</p>";
      return;
    }

    resultado.innerHTML = `
      <div class="card-resultado">
        <h3>${funcionario.nome}</h3>
        <p><strong>ID:</strong> ${funcionario.id}</p>
        <p><strong>E-mail:</strong> ${funcionario.email}</p>
        <p><strong>Telefone:</strong> ${funcionario.telefone}</p>
        <p><strong>CPF:</strong> ${funcionario.cpf}</p>
        <p><strong>Função:</strong> ${funcionario.funcao}</p>
        <p><strong>CRM:</strong> ${funcionario.crm || "Não informado"}</p>
        <p><strong>Especialidade:</strong> ${funcionario.especialidade || "Não informado"}</p>
      </div>
    `;
  }
</script>

</body>
</html>
